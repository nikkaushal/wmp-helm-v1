apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}
  labels:
    appName: {{ .Values.appName }}
spec:
  replicas: {{ .Values.replicas | default 2 }} 
  selector:
    matchLabels:
      appName: {{ .Values.appName }}
  template:
    metadata:
      labels:
        appName: {{ .Values.appName }}
    spec:
      containers:
      - name: {{ .Values.appName }}
        image: 293222827824.dkr.ecr.us-east-1.amazonaws.com/{{ .Values.appName }}:{{ .Values.image.tag }}
        envFrom:
          - configMapRef:
              name: {{ .Values.appName }}-config
